{% extends "base.html" %}

{% block title %}Edit Blog{% endblock %}

{% block content %}
<section class="container page-wrap">
  <div class="card soft" style="max-width: 820px; margin: 2rem auto; padding: 1.5rem;">
    <h1>Edit Blog Post</h1>

    <form method="post" enctype="multipart/form-data" style="display:grid; gap:1rem;">

      <label>Title
        <input type="text" name="title" value="{{ post.title }}" required>
      </label>

      <label>Publish Date
        <input type="date" name="publish_date" value="{{ post.publish_date }}" required>
      </label>

      <label>Category
        <select name="category" required>
          {% for label in ["Soul Speaks", "Faith Foundations", "Practical Growth", "Community & Advocacy"] %}
            <option value="{{ label }}" {% if post.category == label %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </label>

      <label>Blog Number
        <input type="text" name="blog_number" value="{{ post.blog_number }}" required>
      </label>

      <label>Tag 1
        <input type="text" name="topic_1" value="{{ topic_1 }}">
      </label>

      <label>Tag 2
        <input type="text" name="topic_2" value="{{ topic_2 }}">
      </label>

      <label>Tag 3
        <input type="text" name="topic_3" value="{{ topic_3 }}">
      </label>

      <label>Replace Image
        <input type="file" name="image">
      </label>

      <label>Content
        <textarea name="content" rows="16" required>{{ post.content }}</textarea>
      </label>

      <div style="display:flex; gap:.75rem; flex-wrap:wrap;">
        <button class="btn btn-primary" type="submit">Save Changes</button>
        <a class="btn btn-secondary" href="{{ url_for('edit_blog', slug=post.slug) }}">Edit Post</a>
        <a class="btn btn-secondary" href="{{ url_for('blog_post', slug=post.slug) }}">Cancel</a>
      </div>
    </form>
  </div>
</section>
{% endblock %}
